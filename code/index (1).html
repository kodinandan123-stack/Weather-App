<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Skye — Weather</title>
<link rel="stylesheet" href="style.css"/>
</head>
<body class="theme-default">

<div class="blobs">
  <div class="blob b1"></div>
  <div class="blob b2"></div>
  <div class="blob b3"></div>
</div>

<div class="app">

  <!-- HEADER -->
  <header class="hdr">
    <div class="brand">
      <svg width="28" height="28" viewBox="0 0 28 28" fill="none"><circle cx="14" cy="14" r="14" fill="rgba(255,255,255,0.15)"/><circle cx="14" cy="14" r="6" fill="white"/></svg>
      <span>Skye</span>
    </div>
    <div class="unit-sw">
      <button class="ub active" id="btnC" onclick="setUnit('metric')">°C</button>
      <button class="ub" id="btnF" onclick="setUnit('imperial')">°F</button>
    </div>
  </header>

  <!-- SEARCH -->
  <div class="search-wrap">
    <div class="search-box">
      <svg class="s-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="searchInput" placeholder="Search city…" autocomplete="off" spellcheck="false"/>
      <button class="s-btn" id="searchBtn">Search</button>
    </div>
  </div>

  <!-- STATES -->
  <div class="loader hidden" id="loader">
    <div class="spinner"></div>
    <p>Fetching weather…</p>
  </div>

  <div class="err-card hidden" id="errCard">
    <span>⚠</span>
    <p id="errMsg">City not found.</p>
  </div>

  <!-- WEATHER CONTENT -->
  <div class="weather hidden" id="weather">

    <!-- Current -->
    <div class="cur-card">
      <div class="cur-left">
        <div class="city" id="city">—</div>
        <div class="loc-date">
          <span id="country"></span>
          <span class="dot">·</span>
          <span id="wdate"></span>
        </div>
        <div class="temp-row">
          <span class="temp-big" id="tempBig">—</span>
          <span class="temp-unit" id="tempUnit">°C</span>
        </div>
        <div class="cond" id="cond">—</div>
        <div class="feels" id="feels">Feels like —</div>
      </div>
      <div class="cur-right">
        <img id="wicon" src="" alt="" class="w-icon"/>
        <div class="cond-badge" id="condBadge"></div>
      </div>
    </div>

    <!-- Stats -->
    <div class="stats-row">
      <div class="stat-box">
        <div class="sb-ico">💧</div>
        <div class="sb-val" id="sHum">—</div>
        <div class="sb-lab">Humidity</div>
      </div>
      <div class="stat-box">
        <div class="sb-ico">💨</div>
        <div class="sb-val" id="sWind">—</div>
        <div class="sb-lab">Wind</div>
      </div>
      <div class="stat-box">
        <div class="sb-ico">👁</div>
        <div class="sb-val" id="sVis">—</div>
        <div class="sb-lab">Visibility</div>
      </div>
      <div class="stat-box">
        <div class="sb-ico">🌡</div>
        <div class="sb-val" id="sPres">—</div>
        <div class="sb-lab">Pressure</div>
      </div>
    </div>

    <!-- 5-day forecast -->
    <div class="fc-section">
      <h3 class="fc-title">5-Day Forecast</h3>
      <div class="fc-grid" id="fcGrid"></div>
    </div>

  </div>

  <!-- DEFAULT -->
  <div class="default-state" id="defaultState">
    <div class="ds-icon">🌍</div>
    <p>Enter a city to see the weather</p>
  </div>

</div>
<script src="script.js"></script>
</body>
</html>
